
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>

<style>

body {
  font-family: Calibri, Arial, sans-serif;
  background: radial-gradient(circle at top, #3b2a00, #120d02);
  padding: 20px;
  color: #fff;
  display: flex;
  justify-content: center;
}

@keyframes goldPulse {
  0% {
    box-shadow: 0 0 8px #ffd700, 0 0 20px #ffae00;
    border-color: #ffd700;
  }

  50% {
    box-shadow: 0 0 12px #fff3a1, 0 0 28px #ffcc00;
    border-color: #fff3a1;
  }

  100% {
    box-shadow: 0 0 8px #ffd700, 0 0 20px #ffae00;
    border-color: #ffd700;
  }
}

.container {
  width: 100%;
  max-width: 520px;
}

.logo {
  text-align: center;
  margin-bottom: 18px;
}

.logo img {
  width: 230px;
  max-width: 90%;
}

table {
  border-collapse: collapse;
  width: 100%;
  background: rgba(20,15,0,0.92);
  border-radius: 12px;
  border: 3px solid #ffd700;
  animation: goldPulse 2s infinite;
  overflow: hidden;
}

td {
  border: 1px solid rgba(255,255,255,0.12);
  padding: 12px;
  font-size: 14px;
}

td.label {
  width: 140px;
  font-weight: bold;
  color: #ffd700;
}

input,
select {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  color: #fff;
  font-size: 14px;
}

select option {
  color: black;
}

#notif {
  margin-top: 14px;
  color: #ffd700;
  text-align: center;
  display: none;
  font-size: 14px;
}

.footer {
  margin-top: 12px;
  text-align: center;
  color: #999;
  font-size: 12px;
}

@media(max-width:600px){

  body {
    padding: 12px;
  }

  td {
    font-size: 13px;
    padding: 10px;
  }

  td.label {
    width: 110px;
  }

  .logo img {
    width: 190px;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="https://akongfoto.store/images/2025/10/27/gif-akongcuan.gif?v=1757995782&width=758">
  </div>

<form id="form" autocomplete="off">

  <table>

    <tr>
      <td class="label">User ID</td>
      <td>
        <input
          id="userid"
          placeholder="Masukkan User ID"
          autocomplete="off"
          autofocus>
      </td>
    </tr>

    <tr>
      <td class="label">LOGIN SITE</td>
      <td>

        <select id="site">
          <option value="Link Login : https://great25.akongcuankeren.com">⭐️ great25.akongcuankeren.com ⭐️ </option>
        </select>

      </td>
    </tr>

  </table>

  <div id="notif">Copied Successfully ✅</div>

</form>

<div class="footer">
  BUAT SENDIRI BOSS !!<br>
  JANGAN MAIN CURI 😎
</div>

<script>

const WARNING_TEXT = "PUNYA AKONG YOU 👊 SILAHKAN PAKAI BOS!";

// Popup logo
window.addEventListener("DOMContentLoaded", () => {

  const logoImage = document.querySelector(".logo img");

  if (logoImage) {
    logoImage.addEventListener("click", () => {
      alert(WARNING_TEXT);
    });
  }

});


const input = document.getElementById("userid");
const form = document.getElementById("form");
const notif = document.getElementById("notif");
const siteSelect = document.getElementById("site");

// Generate password
function generatePassword(length = 8) {

const letters = "abcdefghijklmnopqrstuvwxyz";
const numbers = "0123456789";

let result = "";

// 4 huruf kecil random
for (let i = 0; i < 5; i++) {

  result += letters.charAt(
    Math.floor(Math.random() * letters.length)
  );

}

// 3 angka random
for (let i = 0; i < 3; i++) {

  result += numbers.charAt(
    Math.floor(Math.random() * numbers.length)
  );

}

// acak posisi karakter
result = result
  .split("")
  .sort(() => Math.random() - 0.5)
  .join("");

  return result;
}

// Copy result
async function copyData() {

  const userId = input.value.trim();

  if (!userId) return;

  const password = generatePassword(8);
  const selectedSite = siteSelect.value;

  const text =
`User ID : ${userId}
Password : ${password}

🎯 ${selectedSite}

Silahkan ubah password sesuai kebutuhan bosku setelah masuk ke website. 🙏

⚠️ kami menyarankan USER ID & PASSWORD jangan sama ya bos ‼️`;

  await navigator.clipboard.writeText(text);

  notif.style.display = "block";

  setTimeout(() => {
    notif.style.display = "none";
  }, 1500);

  input.value = "";
  input.focus();
}

// ENTER auto copy
input.addEventListener("keydown", e => {

  if (e.key === "Enter") {

    e.preventDefault();
    copyData();

  }

});

// Submit backup
form.addEventListener("submit", e => {

  e.preventDefault();
  copyData();

});

</script>
