<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account Helper</title>

<style>

body{
  font-family:Calibri,Arial,sans-serif;
  background:radial-gradient(circle at top,#3b2a00,#120d02);
  padding:20px;
  color:#fff;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:520px;
}

.logo{
  text-align:center;
  margin-bottom:18px;
}

.logo img{
  width:230px;
  max-width:90%;
  border-radius:12px;
}

table{
  border-collapse:collapse;
  width:100%;
  background:rgba(20,15,0,0.92);
  border-radius:12px;
  border:2px solid #d4af37;
  overflow:hidden;
}

td{
  border:1px solid rgba(255,255,255,0.12);
  padding:12px;
  font-size:14px;
}

td.label{
  width:140px;
  font-weight:bold;
  color:#ffd700;
}

input,
select,
textarea{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:14px;
  box-sizing:border-box;
}

textarea{
  min-height:170px;
  resize:none;
  padding-top:10px;
}

select option{
  color:#000;
}

.button{
  width:100%;
  margin-top:14px;
  border:none;
  border-radius:10px;
  padding:14px;
  background:#ffd700;
  color:#111;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

.button:hover{
  opacity:0.9;
}

#notif{
  margin-top:14px;
  color:#ffd700;
  text-align:center;
  display:none;
  font-size:14px;
}

.footer{
  margin-top:14px;
  text-align:center;
  color:#999;
  font-size:12px;
}

.note{
  margin-top:10px;
  font-size:12px;
  color:#bbb;
  text-align:center;
}

@media(max-width:600px){

  body{
    padding:12px;
  }

  td{
    font-size:13px;
    padding:10px;
  }

  td.label{
    width:110px;
  }

  .logo img{
    width:190px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
  <img src="https://akongfoto.store/images/2025/10/27/gif-akongcuan.gif?v=1757995782&width=758">
</div>

<form id="form" autocomplete="off">

<table>

<tr>
  <td class="label">User ID</td>
  <td>
    <input
      id="userid"
      placeholder="Masukkan User ID"
      autocomplete="off"
      autofocus>
  </td>
</tr>

<tr>
  <td class="label">Website</td>
  <td>

    <select id="site">
      <option value="https://great25.akongcuankeren.com">
        great25.akongcuankeren.com
      </option>
    </select>

  </td>
</tr>

<tr>
  <td class="label">Result</td>
  <td>
    <textarea
      id="result"
      readonly
      placeholder="Hasil akan muncul disini..."></textarea>
  </td>
</tr>

</table>

<button type="submit" class="button">
Generate Result
</button>

<button type="button" class="button" id="copyBtn">
Copy Result
</button>

<div id="notif">
Copied Successfully ✅
</div>

</form>

<div class="note">
Simple Account Helper Utility
</div>

<div class="footer">
BUAT SENDIRI BOSS 😎
</div>

</div>

<script>

const WARNING_TEXT =
"UTILITY BY AKONG 👊";

window.addEventListener("DOMContentLoaded", () => {

  const logoImage =
    document.querySelector(".logo img");

  if (logoImage) {

    logoImage.addEventListener("click", () => {
      alert(WARNING_TEXT);
    });

  }

});

const input =
  document.getElementById("userid");

const form =
  document.getElementById("form");

const notif =
  document.getElementById("notif");

const siteSelect =
  document.getElementById("site");

const resultBox =
  document.getElementById("result");

const copyBtn =
  document.getElementById("copyBtn");

function generatePassword(){

  const letters =
    "abcdefghijklmnopqrstuvwxyz";

  const numbers =
    "0123456789";

  let result = "";

  // 4 huruf kecil
  for(let i=0;i<4;i++){

    result += letters.charAt(
      Math.floor(Math.random()*letters.length)
    );

  }

  // 3 angka
  for(let i=0;i<3;i++){

    result += numbers.charAt(
      Math.floor(Math.random()*numbers.length)
    );

  }

  // acak posisi
  result = result
    .split("")
    .sort(()=>Math.random()-0.5)
    .join("");

  return result;

}

function generateData(){

  const userId =
    input.value.trim();

  if(!userId){
    alert("Masukkan User ID");
    return false;
  }

  const code =
    generatePassword();

  const selectedSite =
    siteSelect.value;

  const text =
`User ID : ${userId}
Password : ${code}

Website :
${selectedSite}

Silahkan ubah Password sesuai kebutuhan anda setelah masuk ke website.`;

  resultBox.value = text;

  return true;

}

form.addEventListener("submit", e => {

  e.preventDefault();

  generateData();

});

copyBtn.addEventListener("click", async () => {

  if(!resultBox.value){
    alert("Belum ada hasil");
    return;
  }

  try{

    await navigator.clipboard.writeText(
      resultBox.value
    );

    notif.style.display = "block";

    setTimeout(() => {

      notif.style.display = "none";

    },1500);

  }catch(err){

    alert("Gagal copy");

  }

});

</script>

</body>
</html>
